name: Weekly D1 Backup

# Runs every Sunday at 02:00 UTC and on manual trigger. Exports the full
# database via `wrangler d1 export --remote`, then both:
#   1. uploads the SQL as a workflow artifact (90-day retention)
#   2. commits it to the `backups` branch with a 12-week retention sweep
#
# Two destinations because each guards a different failure mode:
#   - artifact: survives a force-push or branch deletion
#   - branch:   survives the 90-day artifact expiry, gives a diff-able
#               history, and is restorable via plain `git checkout`
#
# To check when the last backup ran, look at the run name in the Actions
# tab — it includes the export date. The job summary surfaces the file
# size and row count so a glance at a green tick confirms it actually
# captured something rather than producing an empty file.
#
# To restore from a backup, see scripts/restore-db.sh and
# docs/OPERATIONS.md (Backup + Restore section).

# Dynamic run name so the date shows in the Actions list without
# having to drill into a run.
run-name: "Backup ${{ github.event.schedule || 'manual' }} — ${{ github.run_started_at }}"

on:
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC
  workflow_dispatch:       # manual trigger button in GitHub UI

jobs:
  backup:
    name: Export D1 and archive
    runs-on: ubuntu-latest
    permissions:
      contents: write     # we push to the backups branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: worker

      - name: Export database to SQL
        id: export
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%d)
          mkdir -p ../backups
          OUT="../backups/wsc-assets-db-${STAMP}.sql"
          npx wrangler d1 export wsc-assets-db --remote --output="$OUT"

          # Sanity stats for the job summary. A backup that produces an
          # empty file or one with no INSERTs has captured nothing useful;
          # surface that here rather than letting it sit silently.
          BYTES=$(wc -c < "$OUT")
          ROWS=$(grep -c '^INSERT' "$OUT" || echo 0)
          if [[ "$BYTES" -lt 1024 ]]; then
            echo "::error::Backup file is suspiciously small (${BYTES} bytes)"
            exit 1
          fi

          # Write a job summary so the Actions UI shows what we captured.
          {
            echo "## Backup ${STAMP}"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Date | ${STAMP} |"
            echo "| File | wsc-assets-db-${STAMP}.sql |"
            echo "| Size | $(numfmt --to=iec-i --suffix=B ${BYTES} 2>/dev/null || echo "${BYTES} B") |"
            echo "| INSERT rows | ${ROWS} |"
          } >> "$GITHUB_STEP_SUMMARY"

          ls -la ../backups/
          echo "stamp=${STAMP}" >> $GITHUB_OUTPUT
          echo "file=wsc-assets-db-${STAMP}.sql" >> $GITHUB_OUTPUT
          echo "bytes=${BYTES}" >> $GITHUB_OUTPUT
          echo "rows=${ROWS}" >> $GITHUB_OUTPUT
          echo "BACKUP COMPLETE: ${STAMP} (${BYTES} bytes, ${ROWS} rows)"

      - name: Upload backup artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ steps.export.outputs.stamp }}
          path: backups/${{ steps.export.outputs.file }}
          retention-days: 90

      - name: Commit to backups branch (12-week retention)
        env:
          STAMP: ${{ steps.export.outputs.stamp }}
          FILE: ${{ steps.export.outputs.file }}
        run: |
          set -euo pipefail
          git config user.name  "wsc-assets-backup-bot"
          git config user.email "actions@github.com"

          # Move the new SQL to a temp location so it survives the branch switch
          TMPDIR=$(mktemp -d)
          cp "backups/$FILE" "$TMPDIR/"

          # Switch to (or create) the backups branch as an orphan-style tree.
          # Using a regular branch — not orphan — so the file history shows in
          # the GitHub UI and `git log` works normally.
          git fetch origin backups || true
          if git show-ref --verify --quiet refs/remotes/origin/backups; then
            git checkout -B backups origin/backups
          else
            git checkout --orphan backups
            git rm -rf . > /dev/null 2>&1 || true
          fi

          mkdir -p backups
          cp "$TMPDIR/$FILE" "backups/$FILE"

          # Retention: keep last 12 weekly backups (84 days). Prune by the
          # YYYY-MM-DD date in the filename, NOT by mtime - git checkout
          # resets every file's mtime to the checkout time, so an mtime
          # filter would never match. Anything older than the cutoff is
          # deleted; restored backups are still recoverable from artifacts
          # within 90 days.
          CUTOFF=$(date -u -d '84 days ago' +%Y-%m-%d)
          echo "Pruning backups older than $CUTOFF"
          for f in backups/wsc-assets-db-*.sql; do
            [ -f "$f" ] || continue
            fdate=$(basename "$f" | sed -E 's|^wsc-assets-db-([0-9]{4}-[0-9]{2}-[0-9]{2})\.sql$|\1|')
            if [[ "$fdate" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] && [[ "$fdate" < "$CUTOFF" ]]; then
              echo "  prune: $f (dated $fdate)"
              rm "$f"
            fi
          done

          git add backups
          if git diff --cached --quiet; then
            echo "No changes to commit (already backed up today)"
          else
            git commit -m "backup: $STAMP"
            git push origin backups
          fi
