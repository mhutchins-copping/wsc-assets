name = "wsc-assets-api"
main = "worker.js"
compatibility_date = "2024-12-01"

# NOTE: routes for `assets.it-wsc.com/api/*` and `assets.it-wsc.com/images/*`
# are registered in the Cloudflare dashboard, not here — the CI token's
# permissions don't cover zone-level route edits and we don't want the
# deploy to fail if that's ever the case. The routes are static and
# rarely change, so managing them in the dashboard is fine.

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "wsc-assets-db"
database_id = "5e966e81-a2b2-4fe7-9b2b-ee29cb02d4e6"

# R2 Bucket (asset photos)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "wsc-assets-images"

# KV namespace for Microsoft Graph access-token caching. Optional but
# strongly recommended — without it every Graph call fetches a fresh
# access token (slower; will trip AAD rate limits under heavy use).
[[kv_namespaces]]
binding = "KV_GRAPH"
id = "a45f445d79ce4bd9ae19edcfd357bf8f"

# Environment variables (set API_KEY via: wrangler secret put API_KEY)
[vars]
ASSET_TAG_PREFIX = "WSC"
CORS_ORIGIN = "https://assets.it-wsc.com"
NOTIFICATIONS_ENABLED = "true"
# Cloudflare Access team subdomain — used to fetch the JWKS the worker needs
# to verify the CF_Authorization cookie's signature. The team lives at
# <value>.cloudflareaccess.com.
CF_ACCESS_TEAM_DOMAIN = "itwsc"
# NOTIFICATION_SENDER = "notifications@walgett.nsw.gov.au"  # Set via: wrangler secret put NOTIFICATION_SENDER
