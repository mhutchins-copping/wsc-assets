name = "wsc-assets-api"
main = "worker.js"
compatibility_date = "2024-12-01"

# Route the worker onto the same origin as the frontend for all /api/*
# and /images/* paths. This way browser requests are same-origin and carry
# the Cloudflare Access cookie automatically — the edge validates it and
# injects Cf-Access-Authenticated-User-Email before hitting the worker.
# The existing api.it-wsc.com custom domain stays active for script callers
# that authenticate with X-Api-Key.
routes = [
  { pattern = "assets.it-wsc.com/api/*", zone_name = "it-wsc.com" },
  { pattern = "assets.it-wsc.com/images/*", zone_name = "it-wsc.com" }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "wsc-assets-db"
database_id = "5e966e81-a2b2-4fe7-9b2b-ee29cb02d4e6"

# R2 Bucket (asset photos)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "wsc-assets-images"

# Environment variables (set API_KEY via: wrangler secret put API_KEY)
[vars]
ASSET_TAG_PREFIX = "WSC"
CORS_ORIGIN = "https://assets.it-wsc.com"
NOTIFICATIONS_ENABLED = "true"
# Cloudflare Access team subdomain — used to fetch the JWKS the worker needs
# to verify the CF_Authorization cookie's signature. The team lives at
# <value>.cloudflareaccess.com.
CF_ACCESS_TEAM_DOMAIN = "itwsc"
# NOTIFICATION_SENDER = "notifications@walgett.nsw.gov.au"  # Set via: wrangler secret put NOTIFICATION_SENDER
